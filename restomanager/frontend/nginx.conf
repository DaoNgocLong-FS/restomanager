user  nginx;
worker_processes  auto;
events { worker_connections 1024; }

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile      on;
  keepalive_timeout 65;
  client_max_body_size 25m;

  # Bắt buộc khi proxy WebSocket: ánh xạ Connection upgrade.
  map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
  }

  upstream restomanager_backend {
    server backend:3000;
  }

  server {
    listen       80;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    # ─── API proxy ────────────────────────────────────────────────────
    location /api/ {
      proxy_pass         http://restomanager_backend/api/;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_read_timeout 60s;
    }

    # ─── Socket.IO (WebSocket) ────────────────────────────────────────
    location /socket.io/ {
      proxy_pass         http://restomanager_backend/socket.io/;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade           $http_upgrade;
      proxy_set_header   Connection        $connection_upgrade;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_read_timeout 3600s;
      proxy_send_timeout 3600s;
      proxy_buffering    off;
    }

    # ─── Admin (vanilla legacy) ──────────────────────────────────────
    # Phục vụ trực tiếp file, KHÔNG đẩy vào SPA fallback
    location = /admin.html {
      try_files $uri =404;
    }

    # JS dùng cho admin (cần phục vụ tĩnh, không SPA)
    location /js/ {
      try_files $uri =404;
      expires 7d;
      access_log off;
      add_header Cache-Control "public";
    }

    # ─── Static assets từ React build (Vite emit /assets/*) ───────────
    location /assets/ {
      try_files $uri =404;
      expires 30d;
      access_log off;
      add_header Cache-Control "public, immutable";
    }

    # ─── React SPA fallback ──────────────────────────────────────────
    # Mọi route khác (/, /login, /cashier/tables, /waiter/menu/T1-01, …)
    # đều trả về index.html của React để client-side router xử lý
    location / {
      try_files $uri $uri/ /index.html;
    }
  }
}
