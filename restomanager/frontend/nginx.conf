user  nginx;
worker_processes  auto;
events { worker_connections 1024; }

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile      on;
  keepalive_timeout 65;
  client_max_body_size 25m;

  # Bắt buộc khi proxy WebSocket: ánh xạ Connection upgrade.
  map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
  }

  upstream restomanager_backend {
    server backend:3000;
  }

  server {
    listen       80;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    location /api/ {
      proxy_pass         http://restomanager_backend/api/;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_read_timeout 60s;
    }

    # Socket.IO – cần Upgrade/Connection cho WebSocket
    location /socket.io/ {
      proxy_pass         http://restomanager_backend/socket.io/;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade           $http_upgrade;
      proxy_set_header   Connection        $connection_upgrade;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_read_timeout 3600s;
      proxy_send_timeout 3600s;
      proxy_buffering    off;
    }

    location / {
      try_files $uri $uri/ /index.html;
    }

    location ~* \.(?:css|js|jpg|jpeg|png|gif|ico|svg|woff2?)$ {
      expires 7d;
      access_log off;
      add_header Cache-Control "public";
    }
  }
}
